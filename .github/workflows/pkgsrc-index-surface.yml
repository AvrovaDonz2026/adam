name: pkgsrc Index Surface

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pkgsrc-index-surface-${{ github.ref }}
  cancel-in-progress: false

jobs:
  index-surface-native:
    name: pkgsrc full-index command surface (linux-x64)
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Exercise full-index Adam commands against real pkgsrc
        env:
          PKGSRC_BOOTSTRAP: unprivileged
          PKGSRC_DIR: ${{ runner.temp }}/pkgsrc
          PKGSRC_PREFIX: ${{ runner.temp }}/pkg
          STATE_DIR: ${{ runner.temp }}/adam-pkgsrc-state
          ADAM_TEST_BUILD_ROOT: "0"
          TEST_PKG: devel/git-base
        run: |
          uname -a
          sh tests/pkgsrc-smoke.sh command-index-full

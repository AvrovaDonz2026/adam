name: CI

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shell-tests:
    name: Shell tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Syntax check
        run: sh -n adam

      - name: Fake pkgsrc test suite
        run: sh tests/run.sh

  pkgsrc-real-build-native:
    name: Real pkgsrc lifecycle (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Install, test, and remove complex pkgsrc package
        env:
          PKGSRC_BOOTSTRAP: unprivileged
          PKGSRC_DIR: ${{ runner.temp }}/pkgsrc
          PKGSRC_PREFIX: ${{ runner.temp }}/pkg
          STATE_DIR: ${{ runner.temp }}/adam-pkgsrc-state
          ADAM_TEST_BUILD_ROOT: "0"
          TEST_PKG: devel/git-base
        run: |
          uname -a
          sh tests/pkgsrc-smoke.sh lifecycle

  pkgsrc-real-build-bsd:
    name: Real pkgsrc lifecycle (${{ matrix.os.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 240
    defaults:
      run:
        shell: cpa.sh {0}
    strategy:
      fail-fast: false
      matrix:
        os:
          - name: netbsd
            version: "10.1"
            architecture: x86-64
            bootstrap: none
            make: make
            build_root: "1"
          - name: openbsd
            version: "7.9"
            architecture: x86-64
            bootstrap: privileged
            make: /usr/pkg/bin/bmake
            build_root: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Start ${{ matrix.os.name }} VM
        uses: cross-platform-actions/action@v1.2.0
        env:
          PKGSRC_BOOTSTRAP: ${{ matrix.os.bootstrap }}
          PKGSRC_DIR: /home/runner/work/pkgsrc
          STATE_DIR: /home/runner/work/adam-pkgsrc-state
          ADAM_TEST_MAKE_CMD: ${{ matrix.os.make }}
          ADAM_TEST_BUILD_ROOT: ${{ matrix.os.build_root }}
          TEST_PKG: devel/git-base
        with:
          operating_system: ${{ matrix.os.name }}
          version: ${{ matrix.os.version }}
          architecture: ${{ matrix.os.architecture }}
          shell: sh
          memory: 6G
          cpu_count: 2
          environment_variables: PKGSRC_BOOTSTRAP PKGSRC_DIR STATE_DIR ADAM_TEST_MAKE_CMD ADAM_TEST_BUILD_ROOT TEST_PKG

      - name: Install, test, and remove complex pkgsrc package on ${{ matrix.os.name }}
        env:
          PKGSRC_BOOTSTRAP: ${{ matrix.os.bootstrap }}
          PKGSRC_DIR: /home/runner/work/pkgsrc
          STATE_DIR: /home/runner/work/adam-pkgsrc-state
          ADAM_TEST_MAKE_CMD: ${{ matrix.os.make }}
          ADAM_TEST_BUILD_ROOT: ${{ matrix.os.build_root }}
          TEST_PKG: devel/git-base
        run: |
          uname -a
          sh tests/pkgsrc-smoke.sh lifecycle

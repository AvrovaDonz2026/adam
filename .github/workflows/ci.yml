name: CI

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: command-suite-${{ github.ref }}
  cancel-in-progress: true

jobs:
  command-suite-native:
    name: Command suite (${{ matrix.name }})
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            runs_on: ubuntu-24.04
          - name: linux-arm64
            runs_on: ubuntu-24.04-arm
          - name: macos-x64
            runs_on: macos-15-intel
          - name: macos-arm64
            runs_on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Syntax check
        run: sh -n adam

      - name: Fake pkgsrc command suite
        run: sh tests/run.sh

  command-suite-bsd:
    name: Command suite (${{ matrix.os.name }}-${{ matrix.os.architecture }})
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: cpa.sh {0}
    strategy:
      fail-fast: false
      matrix:
        os:
          - name: freebsd
            version: "14.4"
            architecture: x86-64
          - name: freebsd
            version: "14.4"
            architecture: arm64
          - name: netbsd
            version: "10.1"
            architecture: x86-64
          - name: netbsd
            version: "10.1"
            architecture: arm64
          - name: openbsd
            version: "7.9"
            architecture: x86-64
          - name: openbsd
            version: "7.9"
            architecture: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Start ${{ matrix.os.name }} VM
        uses: cross-platform-actions/action@v1.2.0
        with:
          operating_system: ${{ matrix.os.name }}
          version: ${{ matrix.os.version }}
          architecture: ${{ matrix.os.architecture }}
          shell: sh
          memory: 4G
          cpu_count: 2

      - name: Syntax check
        run: sh -n adam

      - name: Fake pkgsrc command suite
        run: sh tests/run.sh
